name: Python CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            req_file: requirements.txt
          - os: windows-latest
            req_file: requirements-win.txt

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ${{ matrix.req_file }}

    - name: Run syntax check
      run: |
        python -m py_compile core/separator.py
        python -m py_compile core/analyzer.py
        python -m py_compile main_cli.py
        python -m py_compile main_gui.py
